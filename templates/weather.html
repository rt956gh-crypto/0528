<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>天氣查詢系統</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        input { width: 80%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        .result-box { margin-top: 20px; padding: 15px; background-color: #e9ecef; border-radius: 5px; color: #333; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🌦️ 縣市天氣查詢</h2>
        <form action="/weather" method="POST">
            <input type="text" name="city" placeholder="請輸入縣市名稱" required>
            <br>
            <button type="submit">開始查詢</button>
        </form>

        {% if result %}
            <div class="result-box">
                {{ result | safe }}
            </div>
        {% endif %}
    </div>
</body>
</html>
